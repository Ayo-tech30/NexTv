<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
<title>Search – Nex TV</title>
<link rel="preconnect" href="https://image.tmdb.org" crossorigin>
<link rel="dns-prefetch" href="https://image.tmdb.org">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="dns-prefetch" href="https://fonts.googleapis.com">
<link rel="icon" type="image/jpeg" href="logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#e50914">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NexTV">
<link rel="apple-touch-icon" href="/icons/icon-152.png">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
<meta name="msapplication-TileImage" content="/icons/icon-144.png">
<meta name="msapplication-TileColor" content="#e50914">
</head>
<body>
<nav id="navbar">
  <div class="nav-left">
    <button class="hamburger" id="menuToggle"><i class="fas fa-bars"></i></button>
    <a href="index.html" class="logo">NEX<span>TV</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="movies.html">Movies</a></li>
      <li><a href="series.html">TV Shows</a></li>
      <li><a href="anime.html">Anime</a></li>
      <li><a href="cartoons.html">Cartoons</a></li>
      <li><a href="watchlist.html">My List</a></li>
      <li><a href="history.html">History</a></li>
      <li><a href="downloads.html">Downloads</a></li>
      <li><a href="filter.html">Filter</a></li>
      <li><a href="faq.html">FAQ</a></li>
    </ul>
  </div>
  <div class="nav-right">
    <a href="search.html" class="nav-icon active"><i class="fas fa-search"></i></a>
    <div id="authArea"></div>
  </div>
</nav>

<main class="main-content search-page" style="padding-top:calc(var(--nav-h) + 2rem);">
  <h1 style="font-family:'Bebas Neue',sans-serif; font-size:2rem; margin-bottom:1.5rem; display:flex; align-items:center; gap:.5rem;">
    <i class="fas fa-search" style="color:var(--red)"></i> Search
  </h1>
  <div class="search-box-wrap" style="margin-bottom:.75rem;" id="searchBoxWrap">
    <i class="fas fa-search search-icon-lg"></i>
    <input type="text" class="search-input-lg" id="searchInput" placeholder="Search by title, actor, director, genre..." oninput="doSearch()" autofocus>
    <button class="search-clear" id="searchClear" onclick="clearSearch()"><i class="fas fa-times"></i></button>
  </div>
  <div class="search-filters-row" id="searchFilters">
    <button class="filter-pill active" data-cat="all" onclick="setSearchCat(this,'all')">All</button>
    <button class="filter-pill" data-cat="movies" onclick="setSearchCat(this,'movies')">🎬 Movies</button>
    <button class="filter-pill" data-cat="series" onclick="setSearchCat(this,'series')">📺 Series</button>
    <button class="filter-pill" data-cat="anime" onclick="setSearchCat(this,'anime')">🐉 Anime</button>
    <button class="filter-pill" data-cat="cartoons" onclick="setSearchCat(this,'cartoons')">⭐ Cartoons</button>
    <button class="filter-pill" data-cat="top" onclick="setSearchCat(this,'top')">⭐ 8.5+ Rated</button>
    <button class="filter-pill" data-cat="recent" onclick="setSearchCat(this,'recent')">🆕 2022+</button>
  </div>

  <!-- IDLE SECTION — shown when idle -->
  <div id="idleSection">
    <section class="row-section" style="margin-bottom:2.5rem;">
      <div class="row-header">
        <h2><i class="fas fa-film"></i> Trailers &amp; Teasers</h2>
        <span class="see-all" style="color:var(--muted);font-size:.85rem;">Click to watch trailer</span>
      </div>
      <div class="trailers-row" id="searchTrailersRow"></div>
    </section>
    <section class="row-section" style="margin-bottom:2.5rem;">
      <div class="row-header">
        <h2><i class="fas fa-fire"></i> Trending Now</h2>
      </div>
      <div class="cards-row" id="trendingRow"></div>
    </section>
  </div>

  <!-- RESULTS — shown when typing -->
  <div id="searchResults" style="display:none;"></div>
</main>

<div class="modal-overlay" id="movieModal">
  <div class="modal-box">
    <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-body">
      <img class="modal-poster" id="modalPoster" src="" alt="">
      <div class="modal-info">
        <h2 id="modalTitle"></h2>
        <div class="modal-meta" id="modalMeta"></div>
        <p id="modalDesc"></p>
        <div class="modal-cast" id="modalCast"></div>
        <div class="modal-actions">
          <button class="btn-play" id="modalPlay"><i class="fas fa-play"></i> Watch Now</button>
          <button class="btn-wl" id="modalWL"><i class="far fa-bookmark"></i> My List</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="db.js"></script>
<script src="app.js"></script>
<script>
  DB.init(); renderNav(); injectMobileNav();

  const inp = document.getElementById('searchInput');
  const clr = document.getElementById('searchClear');
  const resultsEl = document.getElementById('searchResults');
  const idleEl    = document.getElementById('idleSection');
  let currentCat = 'all';

  // Populate idle section
  const all = DB.getMovies();
  const trailerIds = ['m1','m2','m3','m13','m6','m11'];
  const trailerMovies = trailerIds.map(id=>all.find(m=>m.id===id)).filter(Boolean);
  renderTrailersRow('searchTrailersRow', trailerMovies);
  renderRow('trendingRow', [...all].sort((a,b) => b.rating - a.rating).slice(0, 12));

  // Autocomplete
  initSearchAutocomplete();

  function setSearchCat(btn, cat) {
    document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    currentCat = cat;
    doSearch();
  }

  function filterByCat(movies, cat) {
    if (cat === 'all') return movies;
    if (cat === 'top') return movies.filter(m=>m.rating>=8.5);
    if (cat === 'recent') return movies.filter(m=>m.year>=2022);
    return movies.filter(m=>m.category===cat);
  }

  function doSearch() {
    const q = inp.value.trim().toLowerCase();
    clr.style.display = q ? 'block' : 'none';

    if (!q && currentCat === 'all') {
      idleEl.style.display = 'block';
      resultsEl.style.display = 'none';
      return;
    }

    idleEl.style.display = 'none';
    resultsEl.style.display = 'block';

    let found = all.filter(m =>
      !q ||
      m.title.toLowerCase().includes(q) ||
      m.genre.some(g => g.toLowerCase().includes(q)) ||
      m.description.toLowerCase().includes(q) ||
      (m.director && m.director.toLowerCase().includes(q)) ||
      m.cast.some(c => c.toLowerCase().includes(q))
    );
    found = filterByCat(found, currentCat);

    if (!found.length) {
      resultsEl.innerHTML = `<div class="empty-state"><i class="fas fa-film"></i><p>No results${q?' for "<strong>'+q+'</strong>"':''}</p></div>`;
    } else {
      resultsEl.innerHTML = `<p style="color:var(--muted);font-size:.85rem;margin-bottom:1rem;">${found.length} result${found.length!==1?'s':''} ${q?'for "<strong>'+q+'</strong>"':''}</p><div class="grid-full" id="searchGrid"></div>`;
      renderGrid('searchGrid', found);
    }
  }

  function clearSearch() {
    inp.value = '';
    clr.style.display = 'none';
    idleEl.style.display = 'block';
    resultsEl.style.display = 'none';
    inp.focus();
  }
</script>
</body>
</html>

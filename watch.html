<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch – Nex TV</title>
<link rel="icon" type="image/jpeg" href="logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
<style>
.player-frame-wrap {
  position: relative; width: 100%; background: #000;
  aspect-ratio: 16/9; max-height: 80vh; overflow: hidden;
}
.player-frame-wrap iframe { width:100%; height:100%; border:none; display:block; }

.player-loading {
  position:absolute; inset:0; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:1.1rem; z-index:10; transition:opacity .5s;
}
.player-loading.hidden { opacity:0; pointer-events:none; }
.spinner {
  width:52px; height:52px;
  border:4px solid rgba(229,9,20,.2); border-top-color:#e50914;
  border-radius:50%; animation:spin .85s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.load-logo { font-family:'Bebas Neue',sans-serif; font-size:2.4rem; letter-spacing:.05em; }
.load-logo span { color:#e50914; }
.load-label { color:#888; font-size:.875rem; text-align:center; }

/* Server bar */
.server-bar {
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:.65rem 2rem; display:flex; align-items:center; gap:.5rem; flex-wrap:wrap;
}
.server-label {
  color:var(--muted); font-size:.78rem; font-weight:700;
  text-transform:uppercase; letter-spacing:.06em;
  display:flex; align-items:center; gap:.35rem; margin-right:.4rem;
}
.srv-btn {
  background:var(--bg3); border:1px solid var(--border); color:var(--muted);
  padding:.32rem 1rem; border-radius:6px; font-size:.8rem; font-weight:600;
  cursor:pointer; font-family:'Outfit',sans-serif; transition:.18s;
  display:flex; align-items:center; gap:.35rem;
}
.srv-btn:hover { border-color:var(--red); color:var(--text); }
.srv-btn.active { background:var(--red); border-color:var(--red); color:#fff; }
.srv-dot { width:7px; height:7px; border-radius:50%; background:currentColor; flex-shrink:0; }

/* Episode panel */
.ep-panel {
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:.9rem 2rem 1rem;
}
.ep-panel-head {
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:.75rem; margin-bottom:.75rem;
}
.ep-panel-title { font-size:.9rem; font-weight:700; display:flex; align-items:center; gap:.45rem; }
.ep-panel-title i { color:var(--red); }
.season-tabs { display:flex; gap:.4rem; flex-wrap:wrap; }
.s-tab {
  background:var(--bg3); border:1px solid var(--border); color:var(--muted);
  padding:.28rem .8rem; border-radius:5px; font-size:.78rem; font-weight:700;
  cursor:pointer; font-family:'Outfit',sans-serif; transition:.18s;
}
.s-tab:hover { border-color:var(--red); color:var(--text); }
.s-tab.active { background:var(--red); border-color:var(--red); color:#fff; }
.ep-grid { display:flex; flex-wrap:wrap; gap:.45rem; max-height:155px; overflow-y:auto; padding-right:4px; }
.ep-btn {
  background:var(--bg3); border:1px solid var(--border); color:var(--muted);
  padding:.3rem .7rem; border-radius:5px; font-size:.78rem; font-weight:600;
  cursor:pointer; font-family:'Outfit',sans-serif; transition:.18s;
  min-width:48px; text-align:center;
}
.ep-btn:hover { border-color:var(--red); color:var(--text); }
.ep-btn.active { background:var(--red); border-color:var(--red); color:#fff; }

/* Now playing badge */
.now-badge {
  display:inline-flex; align-items:center; gap:.4rem;
  background:rgba(229,9,20,.1); border:1px solid rgba(229,9,20,.22); color:var(--red);
  font-size:.72rem; font-weight:700; padding:.22rem .7rem; border-radius:4px;
  text-transform:uppercase; letter-spacing:.07em; margin-bottom:.65rem;
}
.now-badge .pulse { animation:pulse 1.6s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Block common ad overlay elements from vidsrc */
.player-frame-wrap > *:not(iframe):not(.player-loading) {
  display:none !important;
}

.tip-bar {
  background:rgba(255,255,255,.03); border:1px solid var(--border);
  border-radius:8px; padding:.55rem 1rem; font-size:.8rem; color:var(--muted);
  margin-bottom:1rem; display:flex; align-items:center; gap:.5rem; flex-wrap:wrap;
}
.tip-bar i { color:var(--red); flex-shrink:0; }
</style>
</head>
<body class="player-body">

<nav id="navbar" class="nav-player">
  <div class="nav-left">
    <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    <a href="index.html" class="logo">NEX<span>TV</span></a>
  </div>
  <div class="nav-right"><div id="authArea"></div></div>
</nav>

<div class="player-wrap" style="margin-top:var(--nav-h);">

  <!-- PLAYER -->
  <div class="player-frame-wrap">
    <div class="player-loading" id="playerLoading">
      <div class="load-logo">NEX<span>TV</span></div>
      <div class="spinner"></div>
      <p class="load-label" id="loadLabel">Connecting to stream...</p>
    </div>
    <div id="iframeBlocker" style="position:absolute;inset:0;z-index:5;cursor:default;background:transparent;"></div>
    <iframe id="mainFrame" src=""
      allowfullscreen
      allow="autoplay; fullscreen; picture-in-picture; encrypted-media; clipboard-write"
      referrerpolicy="no-referrer-when-downgrade"></iframe>
  </div>

  <!-- SERVER SELECTOR -->
  <div class="server-bar">
    <span class="server-label"><i class="fas fa-server"></i> Server:</span>
    <button class="srv-btn active" id="srv1" onclick="setServer(1)"><span class="srv-dot"></span>VidLink ✦</button>
    <button class="srv-btn"        id="srv2" onclick="setServer(2)"><span class="srv-dot"></span>EmbedSu</button>
    <button class="srv-btn"        id="srv3" onclick="setServer(3)"><span class="srv-dot"></span>VidSrc CC</button>
    <button class="srv-btn"        id="srv4" onclick="setServer(4)"><span class="srv-dot"></span>SuperEmbed</button>
    <button class="srv-btn"        id="srv5" onclick="setServer(5)"><span class="srv-dot"></span>2Embed</button>
  </div>

  <!-- EPISODE PANEL (series only) -->
  <div class="ep-panel" id="epPanel" style="display:none;">
    <div class="ep-panel-head">
      <span class="ep-panel-title"><i class="fas fa-list-ul"></i> Episodes</span>
      <div class="season-tabs" id="seasonTabs"></div>
    </div>
    <div class="ep-grid" id="epGrid"></div>
  </div>

  <!-- INFO -->
  <div class="player-info">
    <div class="tip-bar">
      <i class="fas fa-info-circle"></i>
      <strong>VidLink ✦</strong> is the cleanest server with almost no ads — try it first. If a video doesn't load, switch servers. One popup may appear on SuperEmbed — just close it.
    </div>
    <div class="now-badge"><i class="fas fa-circle pulse"></i> Now Playing</div>
    <div class="player-meta">
      <div>
        <h1 id="playerTitle">Loading...</h1>
        <div class="player-details" id="playerDetails"></div>
      </div>
      <div class="player-actions-side" style="display:flex;flex-direction:column;gap:.5rem;align-items:flex-start;">
        <button class="btn-wl" id="playerWL" onclick="toggleWL()">
          <i class="far fa-bookmark"></i> My List
        </button>
        <button class="watch-trailer-btn" id="playerTrailerBtn" onclick="openTrailer(id)" style="display:none;">
          <i class="fas fa-film"></i> Watch Trailer
        </button>
        <button class="btn-pip" id="btnPiP" onclick="enterPiP()" title="Picture in Picture">
          <i class="fas fa-external-link-alt"></i> PiP
        </button>
        <button class="btn-cc" id="btnCC" onclick="toggleCC()" title="Subtitles / Closed Captions">
          <i class="fas fa-closed-captioning"></i> CC
        </button>
        <button class="btn-pip" onclick="shufflePlay()" title="Watch something random" style="white-space:nowrap;">
          <i class="fas fa-shuffle"></i> Random
        </button>
      </div>
    </div>
    <p id="playerDesc" class="player-desc"></p>
    <div class="player-cast" id="playerCast"></div>
  </div>

  <!-- RELATED -->
  <div class="related-section">
    <h2><i class="fas fa-play-circle"></i> More Like This</h2>
    <div class="cards-row" id="relatedRow"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="db.js"></script>
<script src="app.js"></script>
<script>
// ── Popup / Ad blocker ─────────────────────────────────────────
// ── Aggressive popup / ad blocker ──────────────────────────────
// Block ALL window.open calls from the iframe
window.open = () => null;

// Re-focus window when an iframe tries to open a popup (causes blur)
let lastClick = 0;
document.addEventListener('click', () => { lastClick = Date.now(); });
window.addEventListener('blur', () => {
  // If blur happens without a recent real click, it's an iframe popup — close it
  if (Date.now() - lastClick > 300) {
    setTimeout(() => {
      window.focus();
      // Try to close any new window that snuck through
      try { window.open('','_self'); window.close(); } catch(e) {}
    }, 50);
  }
});

// Remove the blocker overlay after 3s (let user interact with player normally after it loads)
setTimeout(() => {
  const b = document.getElementById('iframeBlocker');
  if (b) b.remove();
}, 3000);

// Block postMessage redirect attempts
window.addEventListener('message', e => {
  if (typeof e.data === 'string' && (e.data.includes('redirect') || e.data.includes('open'))) return;
});

DB.init();
renderNav();

const params = new URLSearchParams(location.search);
const id     = params.get('id');
const movie  = id && DB.getMovie(id);

let currentServer  = 1;
let currentSeason  = 1;
let currentEpisode = 1;

// ── Build embed URL ────────────────────────────────────────────
function buildUrl(srv, m, season, ep) {
  const tmdb     = m.tmdbId;
  const isSeries = (m.type === 'series');

  if (srv === 1) {
    // vidlink.pro — cleanest player, fewest ads, themed to site colors
    return isSeries
      ? `https://vidlink.pro/tv/${tmdb}/${season}/${ep}?primaryColor=e50914&secondaryColor=141414&iconColor=e50914&autoplay=true`
      : `https://vidlink.pro/movie/${tmdb}?primaryColor=e50914&secondaryColor=141414&iconColor=e50914&autoplay=true`;
  }
  if (srv === 2) {
    // embed.su — very reliable, minimal popups
    return isSeries
      ? `https://embed.su/embed/tv/${tmdb}/${season}/${ep}`
      : `https://embed.su/embed/movie/${tmdb}`;
  }
  if (srv === 3) {
    // vidsrc.cc — proper streaming API, supports all titles
    return isSeries
      ? `https://vidsrc.cc/v2/embed/tv/${tmdb}/${season}/${ep}`
      : `https://vidsrc.cc/v2/embed/movie/${tmdb}`;
  }
  if (srv === 4) {
    // superembed (multiembed VIP player) — 1 popup max per session, HLS 1080p
    return isSeries
      ? `https://multiembed.mov/?video_id=${tmdb}&tmdb=1&s=${season}&e=${ep}`
      : `https://multiembed.mov/?video_id=${tmdb}&tmdb=1`;
  }
  if (srv === 5) {
    // 2embed.stream — clean alternative, good for older titles
    return isSeries
      ? `https://www.2embed.stream/embed/tv/${tmdb}/${season}/${ep}`
      : `https://www.2embed.stream/embed/movie/${tmdb}`;
  }
  return '';
}

// ── Auto-failover stream loader ────────────────────────────────
// Tries each server in order. If a server doesn't load within 12s, auto-switches.
let failoverTimer = null;
let failoverAttempt = 0;
const SERVER_ORDER = [1, 2, 3, 4, 5];

function loadStream(skipFailover = false) {
  if (!movie) return;
  clearTimeout(failoverTimer);
  if (!skipFailover) failoverAttempt = 0;

  const frame   = document.getElementById('mainFrame');
  const loading = document.getElementById('playerLoading');
  const isSeries = (movie.type === 'series');

  const label = isSeries
    ? `Loading S${String(currentSeason).padStart(2,'0')} · EP ${String(currentEpisode).padStart(2,'0')}…`
    : `Loading stream…`;
  document.getElementById('loadLabel').textContent = label;

  loading.classList.remove('hidden');
  frame.src = '';

  setTimeout(() => {
    const url = buildUrl(currentServer, movie, currentSeason, currentEpisode);
    frame.src = url;

    // Hide loading spinner after 3s regardless
    setTimeout(() => loading.classList.add('hidden'), 3500);

    // Auto-failover: if iframe fires error or stays blank, try next server
    frame.onerror = () => tryNextServer('Error loading stream');
    frame.onload  = () => {
      // Clear failover timer on successful load
      clearTimeout(failoverTimer);
      loading.classList.add('hidden');
    };

    // Safety net: if nothing loads in 14s, auto-try next server
    failoverTimer = setTimeout(() => {
      // Only auto-switch if we haven't already tried all servers
      if (failoverAttempt < SERVER_ORDER.length - 1) {
        tryNextServer('Server timed out — trying next…');
      } else {
        loading.classList.add('hidden');
        showToast('All servers tried. Try manually switching above.', 'error');
      }
    }, 14000);
  }, 300);

  // Highlight active ep btn
  document.querySelectorAll('.ep-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.ep) === currentEpisode);
  });

  window.scrollTo({ top: document.getElementById('navbar').offsetHeight, behavior: 'smooth' });
}

function tryNextServer(reason) {
  clearTimeout(failoverTimer);
  failoverAttempt++;
  if (failoverAttempt >= SERVER_ORDER.length) {
    showToast('All servers tried. Check your connection.', 'error');
    document.getElementById('playerLoading').classList.add('hidden');
    return;
  }
  // Pick next server in the order
  const nextSrv = SERVER_ORDER[failoverAttempt];
  currentServer = nextSrv;

  // Update active button visually
  for (let i = 1; i <= 5; i++) {
    document.getElementById('srv' + i)?.classList.toggle('active', i === nextSrv);
  }

  const names = {1:'VidLink',2:'EmbedSu',3:'VidSrc CC',4:'SuperEmbed',5:'2Embed'};
  document.getElementById('loadLabel').textContent = `${reason ? reason + ' ' : ''}Trying ${names[nextSrv]}…`;
  showToast(`⚡ Auto-switching to ${names[nextSrv]}…`);
  loadStream(true); // skipFailover=true so we don't reset attempt counter
}

// ── Server switching ───────────────────────────────────────────
function setServer(n) {
  clearTimeout(failoverTimer);
  failoverAttempt = 0; // reset failover when user manually picks
  currentServer = n;
  for (let i = 1; i <= 5; i++) {
    document.getElementById('srv' + i).classList.toggle('active', i === n);
  }
  loadStream();
  const names = {1:'VidLink',2:'EmbedSu',3:'VidSrc CC',4:'SuperEmbed',5:'2Embed'};
  showToast('Switched to ' + names[n]);
}

// ── Episode panel ──────────────────────────────────────────────
function buildEpPanel(m) {
  if (m.type !== 'series') return;
  document.getElementById('epPanel').style.display = 'block';

  const tabsEl = document.getElementById('seasonTabs');
  tabsEl.innerHTML = '';
  for (let s = 1; s <= m.seasons; s++) {
    const btn = document.createElement('button');
    btn.className = 's-tab' + (s === 1 ? ' active' : '');
    btn.textContent = m.seasons === 1 ? 'All Episodes' : 'Season ' + s;
    btn.dataset.s = s;
    btn.onclick = () => {
      currentSeason  = s;
      currentEpisode = 1;
      tabsEl.querySelectorAll('.s-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      buildEpButtons(m);
      loadStream();
    };
    tabsEl.appendChild(btn);
  }
  buildEpButtons(m);
}

function buildEpButtons(m) {
  const grid  = document.getElementById('epGrid');
  const count = (m.episodeCount && m.episodeCount[currentSeason]) || 12;
  grid.innerHTML = '';
  for (let e = 1; e <= count; e++) {
    const btn = document.createElement('button');
    btn.className = 'ep-btn' + (e === currentEpisode ? ' active' : '');
    btn.textContent = 'EP ' + e;
    btn.dataset.ep = e;
    btn.onclick = () => { currentEpisode = e; loadStream(); };
    grid.appendChild(btn);
  }
}

// ── Init ───────────────────────────────────────────────────────
if (!movie) {
  document.getElementById('playerTitle').textContent = 'Title not found';
  document.getElementById('playerLoading').classList.add('hidden');
} else {
  document.title = movie.title + ' – Nex TV';

  document.getElementById('playerTitle').textContent  = movie.title;
  document.getElementById('playerDetails').innerHTML  =
    `<span class="badge-year">${movie.year}</span>
     <span class="badge-dur"><i class="fas fa-clock"></i> ${movie.duration}</span>
     <span class="badge-rating"><i class="fas fa-star"></i> ${movie.rating}</span>
     <span class="badge-genre">${movie.genre.join(' · ')}</span>`;
  document.getElementById('playerDesc').textContent   = movie.description;
  document.getElementById('playerCast').innerHTML     =
    `<strong><i class="fas fa-users"></i> Cast:</strong> ${movie.cast.join(', ')}
     &nbsp;&nbsp;<strong><i class="fas fa-video"></i> Director:</strong> ${movie.director}`;

  buildEpPanel(movie);
  loadStream();

  const trailerBtn = document.getElementById('playerTrailerBtn');
  if (trailerBtn) {
    trailerBtn.style.display = 'inline-flex';
    trailerBtn.onclick = () => openTrailer(id);
  }

  const session = DB.getSession();
  if (session) { DB.addToHistory(session.id, movie.id); updateWLBtn(); }

  const related = DB.getMovies()
    .filter(m => m.id !== movie.id &&
      (m.category === movie.category || m.genre.some(g => movie.genre.includes(g))))
    .slice(0, 10);
  renderRow('relatedRow', related.length ? related
    : DB.getMovies().filter(m => m.id !== movie.id).slice(0, 8));
}

function updateWLBtn() {
  const s = DB.getSession(); if (!s || !movie) return;
  const u = DB.getUserById(s.id);
  const inList = u?.watchlist?.includes(movie.id);
  const btn = document.getElementById('playerWL');
  btn.innerHTML = inList ? '<i class="fas fa-bookmark"></i> In My List' : '<i class="far fa-bookmark"></i> My List';
  btn.classList.toggle('active', !!inList);
}
function toggleWL() {
  const s = DB.getSession();
  if (!s) { window.location.href = 'login.html'; return; }
  DB.toggleWatchlist(s.id, movie.id);
  updateWLBtn();
  showToast('Watchlist updated!');
}

// PiP
function enterPiP() {
  const iframe = document.querySelector('.player-frame-wrap iframe');
  if (!iframe) { showToast('PiP requires a playing video'); return; }
  showToast('💡 PiP works best with direct video — right-click the video for PiP option');
}

// CC Toggle
let ccEnabled = false;
function toggleCC() {
  ccEnabled = !ccEnabled;
  const btn = document.getElementById('btnCC');
  if (btn) {
    btn.classList.toggle('active', ccEnabled);
    btn.innerHTML = `<i class="fas fa-closed-captioning"></i> CC ${ccEnabled?'On':''}`;
  }
  showToast(ccEnabled ? '✓ Subtitles on (when available)' : 'Subtitles off');
}

// Keyboard shortcuts on watch page
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'Escape') history.back();
  if (e.key === 'r') shufflePlay();
});

// Inject mobile nav
injectMobileNav();
// Init progress tracking
const urlPrm = new URLSearchParams(window.location.search);
initWatchProgress(urlPrm.get('id'));
</script>
</body>
</html>

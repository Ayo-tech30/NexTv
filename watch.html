<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch – Nex TV</title>
<link rel="icon" type="image/jpeg" href="logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
<style>
.player-frame-wrap {
  position: relative; width: 100%; background: #000;
  aspect-ratio: 16/9; max-height: 80vh; overflow: hidden;
}
.player-frame-wrap iframe { width:100%; height:100%; border:none; display:block; }

.player-loading {
  position:absolute; inset:0; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:1.1rem; z-index:10; transition:opacity .5s;
}
.player-loading.hidden { opacity:0; pointer-events:none; }
.spinner {
  width:52px; height:52px;
  border:4px solid rgba(229,9,20,.2); border-top-color:#e50914;
  border-radius:50%; animation:spin .85s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.load-logo { font-family:'Bebas Neue',sans-serif; font-size:2.4rem; letter-spacing:.05em; }
.load-logo span { color:#e50914; }
.load-label { color:#888; font-size:.875rem; text-align:center; }

/* Server bar */
.server-bar {
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:.65rem 2rem; display:flex; align-items:center; gap:.5rem; flex-wrap:wrap;
}
.server-label {
  color:var(--muted); font-size:.78rem; font-weight:700;
  text-transform:uppercase; letter-spacing:.06em;
  display:flex; align-items:center; gap:.35rem; margin-right:.4rem;
}
.srv-btn {
  background:var(--bg3); border:1px solid var(--border); color:var(--muted);
  padding:.32rem 1rem; border-radius:6px; font-size:.8rem; font-weight:600;
  cursor:pointer; font-family:'Outfit',sans-serif; transition:.18s;
  display:flex; align-items:center; gap:.35rem;
}
.srv-btn:hover { border-color:var(--red); color:var(--text); }
.srv-btn.active { background:var(--red); border-color:var(--red); color:#fff; }
.srv-dot { width:7px; height:7px; border-radius:50%; background:currentColor; flex-shrink:0; }

/* Episode panel */
.ep-panel {
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:.9rem 2rem 1rem;
}
.ep-panel-head {
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:.75rem; margin-bottom:.75rem;
}
.ep-panel-title { font-size:.9rem; font-weight:700; display:flex; align-items:center; gap:.45rem; }
.ep-panel-title i { color:var(--red); }
.season-tabs { display:flex; gap:.4rem; flex-wrap:wrap; }
.s-tab {
  background:var(--bg3); border:1px solid var(--border); color:var(--muted);
  padding:.28rem .8rem; border-radius:5px; font-size:.78rem; font-weight:700;
  cursor:pointer; font-family:'Outfit',sans-serif; transition:.18s;
}
.s-tab:hover { border-color:var(--red); color:var(--text); }
.s-tab.active { background:var(--red); border-color:var(--red); color:#fff; }
.ep-grid { display:flex; flex-wrap:wrap; gap:.45rem; max-height:155px; overflow-y:auto; padding-right:4px; }
.ep-btn {
  background:var(--bg3); border:1px solid var(--border); color:var(--muted);
  padding:.3rem .7rem; border-radius:5px; font-size:.78rem; font-weight:600;
  cursor:pointer; font-family:'Outfit',sans-serif; transition:.18s;
  min-width:48px; text-align:center;
}
.ep-btn:hover { border-color:var(--red); color:var(--text); }
.ep-btn.active { background:var(--red); border-color:var(--red); color:#fff; }

/* Now playing badge */
.now-badge {
  display:inline-flex; align-items:center; gap:.4rem;
  background:rgba(229,9,20,.1); border:1px solid rgba(229,9,20,.22); color:var(--red);
  font-size:.72rem; font-weight:700; padding:.22rem .7rem; border-radius:4px;
  text-transform:uppercase; letter-spacing:.07em; margin-bottom:.65rem;
}
.now-badge .pulse { animation:pulse 1.6s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.tip-bar {
  background:rgba(255,255,255,.03); border:1px solid var(--border);
  border-radius:8px; padding:.55rem 1rem; font-size:.8rem; color:var(--muted);
  margin-bottom:1rem; display:flex; align-items:center; gap:.5rem; flex-wrap:wrap;
}
.tip-bar i { color:var(--red); flex-shrink:0; }
</style>
</head>
<body class="player-body">

<nav id="navbar" class="nav-player">
  <div class="nav-left">
    <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    <a href="index.html" class="logo">NEX<span>TV</span></a>
  </div>
  <div class="nav-right"><div id="authArea"></div></div>
</nav>

<div class="player-wrap" style="margin-top:var(--nav-h);">

  <!-- PLAYER -->
  <div class="player-frame-wrap">
    <div class="player-loading" id="playerLoading">
      <div class="load-logo">NEX<span>TV</span></div>
      <div class="spinner"></div>
      <p class="load-label" id="loadLabel">Connecting to stream...</p>
    </div>
    <iframe id="mainFrame" src="" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
  </div>

  <!-- SERVER SELECTOR -->
  <div class="server-bar">
    <span class="server-label"><i class="fas fa-server"></i> Server:</span>
    <button class="srv-btn active" id="srv1" onclick="setServer(1)"><span class="srv-dot"></span>VidSrc 1</button>
    <button class="srv-btn"        id="srv2" onclick="setServer(2)"><span class="srv-dot"></span>VidSrc 2</button>
    <button class="srv-btn"        id="srv3" onclick="setServer(3)"><span class="srv-dot"></span>2Embed</button>
    <button class="srv-btn"        id="srv4" onclick="setServer(4)"><span class="srv-dot"></span>VidSrc 3</button>
    <button class="srv-btn"        id="srv5" onclick="setServer(5)"><span class="srv-dot"></span>MoviesAPI</button>
  </div>

  <!-- EPISODE PANEL (series only) -->
  <div class="ep-panel" id="epPanel" style="display:none;">
    <div class="ep-panel-head">
      <span class="ep-panel-title"><i class="fas fa-list-ul"></i> Episodes</span>
      <div class="season-tabs" id="seasonTabs"></div>
    </div>
    <div class="ep-grid" id="epGrid"></div>
  </div>

  <!-- INFO -->
  <div class="player-info">
    <div class="tip-bar">
      <i class="fas fa-info-circle"></i>
      If the video doesn't load, try a different server button above. Each server has different content availability.
    </div>
    <div class="now-badge"><i class="fas fa-circle pulse"></i> Now Playing</div>
    <div class="player-meta">
      <div>
        <h1 id="playerTitle">Loading...</h1>
        <div class="player-details" id="playerDetails"></div>
      </div>
      <div class="player-actions-side">
        <button class="btn-wl" id="playerWL" onclick="toggleWL()">
          <i class="far fa-bookmark"></i> My List
        </button>
      </div>
    </div>
    <p id="playerDesc" class="player-desc"></p>
    <div class="player-cast" id="playerCast"></div>
  </div>

  <!-- RELATED -->
  <div class="related-section">
    <h2><i class="fas fa-play-circle"></i> More Like This</h2>
    <div class="cards-row" id="relatedRow"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="db.js"></script>
<script src="app.js"></script>
<script>
DB.init();
renderNav();

const params = new URLSearchParams(location.search);
const id     = params.get('id');
const movie  = id && DB.getMovie(id);

let currentServer  = 1;
let currentSeason  = 1;
let currentEpisode = 1;

// ── Build embed URL ────────────────────────────────────────────
function buildUrl(srv, m, season, ep) {
  const tmdb     = m.tmdbId;
  const isSeries = (m.type === 'series');

  if (srv === 1) {
    // vidsrc.to  (most reliable)
    return isSeries
      ? `https://vidsrc.to/embed/tv/${tmdb}/${season}/${ep}`
      : `https://vidsrc.to/embed/movie/${tmdb}`;
  }
  if (srv === 2) {
    // vidsrc.xyz
    return isSeries
      ? `https://vidsrc.xyz/embed/tv?tmdb=${tmdb}&season=${season}&episode=${ep}`
      : `https://vidsrc.xyz/embed/movie?tmdb=${tmdb}`;
  }
  if (srv === 3) {
    // 2embed.cc
    return isSeries
      ? `https://www.2embed.cc/embedtv/${tmdb}&s=${season}&e=${ep}`
      : `https://www.2embed.cc/embed/${tmdb}`;
  }
  if (srv === 4) {
    // vidsrc.me  (vidsrc v3)
    return isSeries
      ? `https://vidsrc.me/embed/tv?tmdb=${tmdb}&season=${season}&episode=${ep}`
      : `https://vidsrc.me/embed/movie?tmdb=${tmdb}`;
  }
  if (srv === 5) {
    // moviesapi.club
    return isSeries
      ? `https://moviesapi.club/tv/${tmdb}-${season}-${ep}`
      : `https://moviesapi.club/movie/${tmdb}`;
  }
  return '';
}

// ── Load stream ────────────────────────────────────────────────
function loadStream() {
  if (!movie) return;
  const frame   = document.getElementById('mainFrame');
  const loading = document.getElementById('playerLoading');

  const isSeries = (movie.type === 'series');
  document.getElementById('loadLabel').textContent = isSeries
    ? `Loading S${String(currentSeason).padStart(2,'0')} · EP ${String(currentEpisode).padStart(2,'0')}…`
    : `Loading full movie · ${movie.duration}…`;

  loading.classList.remove('hidden');
  frame.src = '';

  setTimeout(() => {
    frame.src = buildUrl(currentServer, movie, currentSeason, currentEpisode);
    setTimeout(() => loading.classList.add('hidden'), 4000);
  }, 300);

  // Highlight active ep btn
  document.querySelectorAll('.ep-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.ep) === currentEpisode);
  });

  window.scrollTo({ top: document.getElementById('navbar').offsetHeight, behavior: 'smooth' });
}

// ── Server switching ───────────────────────────────────────────
function setServer(n) {
  currentServer = n;
  for (let i = 1; i <= 5; i++) {
    document.getElementById('srv' + i).classList.toggle('active', i === n);
  }
  loadStream();
  const names = {1:'VidSrc 1',2:'VidSrc 2',3:'2Embed',4:'VidSrc 3',5:'MoviesAPI'};
  showToast('Switched to ' + names[n]);
}

// ── Episode panel ──────────────────────────────────────────────
function buildEpPanel(m) {
  if (m.type !== 'series') return;
  document.getElementById('epPanel').style.display = 'block';

  const tabsEl = document.getElementById('seasonTabs');
  tabsEl.innerHTML = '';
  for (let s = 1; s <= m.seasons; s++) {
    const btn = document.createElement('button');
    btn.className = 's-tab' + (s === 1 ? ' active' : '');
    btn.textContent = m.seasons === 1 ? 'All Episodes' : 'Season ' + s;
    btn.dataset.s = s;
    btn.onclick = () => {
      currentSeason  = s;
      currentEpisode = 1;
      tabsEl.querySelectorAll('.s-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      buildEpButtons(m);
      loadStream();
    };
    tabsEl.appendChild(btn);
  }
  buildEpButtons(m);
}

function buildEpButtons(m) {
  const grid  = document.getElementById('epGrid');
  const count = (m.episodeCount && m.episodeCount[currentSeason]) || 12;
  grid.innerHTML = '';
  for (let e = 1; e <= count; e++) {
    const btn = document.createElement('button');
    btn.className = 'ep-btn' + (e === currentEpisode ? ' active' : '');
    btn.textContent = 'EP ' + e;
    btn.dataset.ep = e;
    btn.onclick = () => { currentEpisode = e; loadStream(); };
    grid.appendChild(btn);
  }
}

// ── Init ───────────────────────────────────────────────────────
if (!movie) {
  document.getElementById('playerTitle').textContent = 'Title not found';
  document.getElementById('playerLoading').classList.add('hidden');
} else {
  document.title = movie.title + ' – Nex TV';

  document.getElementById('playerTitle').textContent  = movie.title;
  document.getElementById('playerDetails').innerHTML  =
    `<span class="badge-year">${movie.year}</span>
     <span class="badge-dur"><i class="fas fa-clock"></i> ${movie.duration}</span>
     <span class="badge-rating"><i class="fas fa-star"></i> ${movie.rating}</span>
     <span class="badge-genre">${movie.genre.join(' · ')}</span>`;
  document.getElementById('playerDesc').textContent   = movie.description;
  document.getElementById('playerCast').innerHTML     =
    `<strong><i class="fas fa-users"></i> Cast:</strong> ${movie.cast.join(', ')}
     &nbsp;&nbsp;<strong><i class="fas fa-video"></i> Director:</strong> ${movie.director}`;

  buildEpPanel(movie);
  loadStream();

  const session = DB.getSession();
  if (session) { DB.addToHistory(session.id, movie.id); updateWLBtn(); }

  const related = DB.getMovies()
    .filter(m => m.id !== movie.id &&
      (m.category === movie.category || m.genre.some(g => movie.genre.includes(g))))
    .slice(0, 10);
  renderRow('relatedRow', related.length ? related
    : DB.getMovies().filter(m => m.id !== movie.id).slice(0, 8));
}

function updateWLBtn() {
  const s = DB.getSession(); if (!s || !movie) return;
  const u = DB.getUserById(s.id);
  const inList = u?.watchlist?.includes(movie.id);
  const btn = document.getElementById('playerWL');
  btn.innerHTML = inList ? '<i class="fas fa-bookmark"></i> In My List' : '<i class="far fa-bookmark"></i> My List';
  btn.classList.toggle('active', !!inList);
}
function toggleWL() {
  const s = DB.getSession();
  if (!s) { window.location.href = 'login.html'; return; }
  DB.toggleWatchlist(s.id, movie.id);
  updateWLBtn();
  showToast('Watchlist updated!');
}
</script>
</body>
</html>

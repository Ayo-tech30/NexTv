<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch – Nex TV</title>
<link rel="icon" type="image/jpeg" href="logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
<style>
/* ─── Player ─────────────────────────────────────── */
.player-frame-wrap {
  position: relative;
  width: 100%;
  background: #000;
  aspect-ratio: 16/9;
  max-height: 80vh;
  overflow: hidden;
}
.player-frame-wrap iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
.player-loading {
  position: absolute;
  inset: 0;
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.2rem;
  z-index: 10;
  transition: opacity .5s;
}
.player-loading.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 52px; height: 52px;
  border: 4px solid rgba(229,9,20,.2);
  border-top-color: #e50914;
  border-radius: 50%;
  animation: spin .85s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-logo { font-family:'Bebas Neue',sans-serif; font-size: 2.4rem; letter-spacing:.05em; }
.loading-logo span { color: #e50914; }
.loading-label { color: #888; font-size: .875rem; text-align:center; max-width:260px; line-height:1.5; }

/* ─── Source bar ─────────────────────────────────── */
.source-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: .65rem 2rem;
  display: flex;
  align-items: center;
  gap: .6rem;
  flex-wrap: wrap;
}
.source-bar-label {
  color: var(--muted);
  font-size: .78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  display: flex; align-items: center; gap: .35rem;
  margin-right: .25rem;
}
.src-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: .32rem .95rem;
  border-radius: 6px;
  font-size: .8rem;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  transition: .18s;
  display: flex; align-items: center; gap: .35rem;
}
.src-btn:hover { border-color: var(--red); color: var(--text); }
.src-btn.active { background: var(--red); border-color: var(--red); color: #fff; }
.src-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

/* ─── Episode panel ──────────────────────────────── */
.episode-panel {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: .9rem 2rem 1rem;
}
.ep-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: .75rem;
  margin-bottom: .75rem;
}
.ep-panel-title {
  font-size: .9rem;
  font-weight: 700;
  display: flex; align-items: center; gap: .45rem;
}
.ep-panel-title i { color: var(--red); }
.season-tabs { display: flex; gap: .4rem; flex-wrap: wrap; }
.season-tab {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: .28rem .75rem;
  border-radius: 5px;
  font-size: .78rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  transition: .18s;
}
.season-tab:hover { border-color: var(--red); color: var(--text); }
.season-tab.active { background: var(--red); border-color: var(--red); color: #fff; }
.episodes-row {
  display: flex;
  flex-wrap: wrap;
  gap: .45rem;
  max-height: 150px;
  overflow-y: auto;
  padding-right: 4px;
}
.ep-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: .3rem .7rem;
  border-radius: 5px;
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  transition: .18s;
  min-width: 48px;
  text-align: center;
}
.ep-btn:hover { border-color: var(--red); color: var(--text); }
.ep-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

/* ─── Info panel ─────────────────────────────────── */
.now-badge {
  display: inline-flex; align-items: center; gap: .4rem;
  background: rgba(229,9,20,.1);
  border: 1px solid rgba(229,9,20,.22);
  color: var(--red);
  font-size: .72rem;
  font-weight: 700;
  padding: .22rem .7rem;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: .65rem;
}
.now-badge .pulse { animation: pulse 1.6s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

/* ─── Source credit ──────────────────────────────── */
.source-credit {
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: .6rem 1rem;
  font-size: .8rem;
  color: var(--muted);
  margin-bottom: 1rem;
  display: flex; align-items: center; gap: .5rem;
  flex-wrap: wrap;
}
.source-credit i { color: var(--red); }
.source-credit a { color: var(--red); }
.source-credit a:hover { text-decoration: underline; }
</style>
</head>
<body class="player-body">

<nav id="navbar" class="nav-player">
  <div class="nav-left">
    <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    <a href="index.html" class="logo">NEX<span>TV</span></a>
  </div>
  <div class="nav-right">
    <div id="authArea"></div>
  </div>
</nav>

<div class="player-wrap" style="margin-top:var(--nav-h);">

  <!-- VIDEO PLAYER -->
  <div class="player-frame-wrap">
    <div class="player-loading" id="playerLoading">
      <div class="loading-logo">NEX<span>TV</span></div>
      <div class="spinner"></div>
      <p class="loading-label" id="loadingLabel">Loading full movie...</p>
    </div>
    <iframe id="mainFrame" src="" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
  </div>

  <!-- SOURCE BAR (shown only for archive.org content with mirror) -->
  <div class="source-bar" id="sourceBar">
    <span class="source-bar-label"><i class="fas fa-server"></i> Mirror:</span>
    <button class="src-btn active" id="srcBtn1" onclick="setMirror(1)">
      <span class="src-dot"></span> Archive.org
    </button>
    <button class="src-btn" id="srcBtn2" onclick="setMirror(2)">
      <span class="src-dot"></span> Direct Link
    </button>
  </div>

  <!-- EPISODE PANEL (series/anime/cartoons only) -->
  <div class="episode-panel" id="episodePanel" style="display:none;">
    <div class="ep-panel-header">
      <span class="ep-panel-title"><i class="fas fa-list-ul"></i> <span id="epPanelLabel">Episodes</span></span>
      <div class="season-tabs" id="seasonTabs"></div>
    </div>
    <div class="episodes-row" id="episodesRow"></div>
  </div>

  <!-- INFO -->
  <div class="player-info">
    <div class="source-credit" id="sourceCredit">
      <i class="fas fa-info-circle"></i>
      <span id="sourceCreditText">Streaming from <a href="https://archive.org" target="_blank" rel="noopener">Internet Archive</a> — 100% free &amp; legal public domain content</span>
    </div>
    <div class="now-badge"><i class="fas fa-circle pulse"></i> Now Playing</div>
    <div class="player-meta">
      <div>
        <h1 id="playerTitle">Loading...</h1>
        <div class="player-details" id="playerDetails"></div>
      </div>
      <div class="player-actions-side">
        <button class="btn-wl" id="playerWL" onclick="toggleWL()">
          <i class="far fa-bookmark"></i> My List
        </button>
      </div>
    </div>
    <p id="playerDesc" class="player-desc"></p>
    <div class="player-cast" id="playerCast"></div>
  </div>

  <!-- RELATED -->
  <div class="related-section">
    <h2><i class="fas fa-play-circle"></i> More Like This</h2>
    <div class="cards-row" id="relatedRow"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="db.js"></script>
<script src="app.js"></script>
<script>
DB.init();
renderNav();

const params = new URLSearchParams(location.search);
const id     = params.get('id');
const movie  = id && DB.getMovie(id);

let currentMirror  = 1;
let currentSeason  = 1;
let currentEpIndex = 0;  // index into episodeIds[season] or youtubePlaylist

// ── Build embed URL ─────────────────────────────────────────────
function buildUrl(m, mirror, season, epIdx) {
  if (m.videoType === 'youtube') {
    // YouTube: either single video or playlist entry
    let ytId = m.videoSrc;
    if (m.youtubePlaylist && m.youtubePlaylist[epIdx]) {
      ytId = m.youtubePlaylist[epIdx].ytId;
    }
    return `https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&modestbranding=1`;
  }

  if (m.videoType === 'archive') {
    // series: pick episode identifier
    let identifier = m.videoSrc;
    if (m.episodeIds && m.episodeIds[season]) {
      identifier = m.episodeIds[season][epIdx] || m.episodeIds[season][0];
    }

    if (mirror === 2) {
      // Direct archive.org details page in new tab (fallback)
      return `https://archive.org/details/${identifier}`;
    }
    return `https://archive.org/embed/${identifier}?autoplay=1&start=0`;
  }

  return '';
}

// ── Load stream ─────────────────────────────────────────────────
function loadStream() {
  if (!movie) return;
  const frame   = document.getElementById('mainFrame');
  const loading = document.getElementById('playerLoading');
  const label   = document.getElementById('loadingLabel');

  const isSeries = (movie.type === 'series');
  label.textContent = isSeries
    ? `Loading S${currentSeason} · EP ${currentEpIndex + 1}...`
    : `Loading full movie — ${movie.duration}...`;

  loading.classList.remove('hidden');
  frame.src = '';

  setTimeout(() => {
    const url = buildUrl(movie, currentMirror, currentSeason, currentEpIndex);
    if (currentMirror === 2 && movie.videoType === 'archive') {
      // Open archive.org page in new tab (their direct pages work better than some embeds)
      window.open(url, '_blank');
      loading.classList.add('hidden');
      showToast('Opening in Archive.org tab…');
    } else {
      frame.src = url;
      setTimeout(() => loading.classList.add('hidden'), 3500);
    }
  }, 300);

  // Highlight active ep button
  document.querySelectorAll('.ep-btn').forEach((b, i) => {
    b.classList.toggle('active', i === currentEpIndex);
  });

  window.scrollTo({ top: document.getElementById('navbar').offsetHeight + 10, behavior: 'smooth' });
}

function setMirror(n) {
  currentMirror = n;
  document.getElementById('srcBtn1').classList.toggle('active', n === 1);
  document.getElementById('srcBtn2').classList.toggle('active', n === 2);
  loadStream();
}

// ── Episode panel ────────────────────────────────────────────────
function buildEpisodePanel(m) {
  if (m.type !== 'series') return;
  document.getElementById('episodePanel').style.display = 'block';
  document.getElementById('epPanelLabel').textContent =
    m.category === 'anime' ? 'Episodes' : m.category === 'cartoons' ? 'Shorts / Episodes' : 'Episodes';

  // Season tabs
  const tabsEl = document.getElementById('seasonTabs');
  tabsEl.innerHTML = '';
  for (let s = 1; s <= m.seasons; s++) {
    const btn = document.createElement('button');
    btn.className = 'season-tab' + (s === 1 ? ' active' : '');
    btn.textContent = m.seasons === 1 ? 'All Episodes' : 'Season ' + s;
    btn.dataset.season = s;
    btn.onclick = () => {
      currentSeason  = s;
      currentEpIndex = 0;
      document.querySelectorAll('.season-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderEpisodeButtons(m);
      loadStream();
    };
    tabsEl.appendChild(btn);
  }
  renderEpisodeButtons(m);
}

function renderEpisodeButtons(m) {
  const row = document.getElementById('episodesRow');
  row.innerHTML = '';
  let count = 8; // default

  if (m.videoType === 'archive' && m.episodeIds && m.episodeIds[currentSeason]) {
    count = m.episodeIds[currentSeason].length;
  } else if (m.videoType === 'youtube' && m.youtubePlaylist) {
    count = m.youtubePlaylist.length;
  }

  for (let i = 0; i < count; i++) {
    const btn = document.createElement('button');
    btn.className = 'ep-btn' + (i === currentEpIndex ? ' active' : '');
    const epNum = i + 1;
    // Label
    let label = 'EP ' + epNum;
    if (m.videoType === 'youtube' && m.youtubePlaylist && m.youtubePlaylist[i]) {
      label = 'EP ' + epNum;
    }
    btn.textContent = label;
    btn.title = m.videoType === 'youtube' && m.youtubePlaylist
      ? (m.youtubePlaylist[i] ? m.youtubePlaylist[i].title : label)
      : label;
    btn.dataset.idx = i;
    btn.onclick = () => {
      currentEpIndex = i;
      loadStream();
    };
    row.appendChild(btn);
  }
}

// ── Source credit ───────────────────────────────────────────────
function setSourceCredit(m) {
  const el = document.getElementById('sourceCreditText');
  if (m.videoType === 'youtube') {
    el.innerHTML = '<i class="fas fa-play-circle" style="color:var(--red)"></i> Streaming via <a href="https://youtube.com" target="_blank" rel="noopener">YouTube</a> — free &amp; legal content';
    // hide mirror bar for youtube
    document.getElementById('sourceBar').style.display = 'none';
  } else {
    el.innerHTML = '<i class="fas fa-info-circle"></i> Streaming from <a href="https://archive.org/details/' + m.videoSrc + '" target="_blank" rel="noopener">Internet Archive</a> — 100% free &amp; legal public domain. If it doesn\'t load, click <strong>Direct Link</strong> above.';
  }
}

// ── Main init ───────────────────────────────────────────────────
if (!movie) {
  document.getElementById('playerTitle').textContent = 'Title not found';
  document.getElementById('playerLoading').classList.add('hidden');
} else {
  document.title = movie.title + ' – Nex TV';

  document.getElementById('playerTitle').textContent = movie.title;
  document.getElementById('playerDetails').innerHTML =
    `<span class="badge-year">${movie.year}</span>
     <span class="badge-dur"><i class="fas fa-clock"></i> ${movie.duration}</span>
     <span class="badge-rating"><i class="fas fa-star"></i> ${movie.rating}</span>
     <span class="badge-genre">${movie.genre.join(' · ')}</span>`;
  document.getElementById('playerDesc').textContent = movie.description;
  document.getElementById('playerCast').innerHTML =
    `<strong><i class="fas fa-users"></i> Cast:</strong> ${movie.cast.join(', ')}
     &nbsp;&nbsp;<strong><i class="fas fa-video"></i> Director:</strong> ${movie.director}`;

  setSourceCredit(movie);
  buildEpisodePanel(movie);
  loadStream();

  const session = DB.getSession();
  if (session) {
    DB.addToHistory(session.id, movie.id);
    updateWLButton();
  }

  const related = DB.getMovies()
    .filter(m => m.id !== movie.id &&
      (m.category === movie.category || m.genre.some(g => movie.genre.includes(g))))
    .slice(0, 10);
  renderRow('relatedRow', related.length ? related : DB.getMovies().filter(m => m.id !== movie.id).slice(0, 8));
}

function updateWLButton() {
  const session = DB.getSession();
  if (!session || !movie) return;
  const user  = DB.getUserById(session.id);
  const inList = user?.watchlist?.includes(movie.id);
  const btn   = document.getElementById('playerWL');
  btn.innerHTML = inList ? '<i class="fas fa-bookmark"></i> In My List' : '<i class="far fa-bookmark"></i> My List';
  btn.classList.toggle('active', !!inList);
}

function toggleWL() {
  const session = DB.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  DB.toggleWatchlist(session.id, movie.id);
  updateWLButton();
  showToast('Watchlist updated!');
}
</script>
</body>
</html>

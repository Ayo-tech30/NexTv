<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
<title>Sign In – Nex TV</title>
<link rel="preconnect" href="https://image.tmdb.org" crossorigin>
<link rel="dns-prefetch" href="https://image.tmdb.org">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="dns-prefetch" href="https://fonts.googleapis.com">
<link rel="icon" type="image/jpeg" href="logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav id="navbar">
  <div class="nav-left">
    <a href="index.html" class="logo">NEX<span>TV</span></a>
  </div>
  <div class="nav-right">
    <div id="authArea"></div>
  </div>
</nav>

<main class="main-content" style="padding-top:calc(var(--nav-h) + 3rem); display:flex; justify-content:center;">
  <div class="auth-card" style="width:100%; max-width:420px; position:relative;"><button onclick="history.length>1?history.back():window.location.href='index.html'" style="position:absolute;top:.75rem;right:.75rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:var(--muted);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;z-index:10;" title="Go back"><i class="fas fa-times"></i></button>
    <div style="text-align:center; margin-bottom:2rem;">
      <div class="logo" style="font-size:2rem; display:inline-block;">NEX<span style="color:var(--red)">TV</span></div>
      <h1 style="font-size:1.4rem; margin-top:.5rem;">Sign In</h1>
      <p style="color:var(--muted); font-size:.9rem; margin-top:.3rem;">Welcome back! Sign in to continue.</p>
    </div>
    <div id="loginError" class="form-error" style="display:none;"></div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <input type="password" class="form-input" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="pw-toggle" onclick="togglePw('loginPass',this)"><i class="fas fa-eye"></i></button>
      </div>
    </div>
    <button class="btn-submit" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    <p class="auth-switch">Don't have an account? <a href="register.html" class="link-inline">Create one</a></p>
  </div>
</main>

<div class="toast" id="toast"></div>
<script src="db.js"></script>
<script src="app.js"></script>
<script>
  DB.init(); renderNav();
  function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    const errEl = document.getElementById('loginError');
    if (!email || !pass) { errEl.textContent='Please fill in all fields.'; errEl.style.display='block'; return; }
    const res = DB.login(email, pass);
    if (res.error) { errEl.textContent=res.error; errEl.style.display='block'; return; }
    const redir = new URLSearchParams(location.search).get('redirect') || 'index.html';
    window.location.href = redir;
  }
</script>
</body>
</html>

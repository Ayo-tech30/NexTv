<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
<title>Downloads – Nex TV</title>
<link rel="icon" type="image/jpeg" href="logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#e50914">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NexTV">
<link rel="apple-touch-icon" href="/icons/icon-152.png">
<style>
.dl-hero { margin-top:var(--nav-h); background:linear-gradient(135deg,#0a0a0a,#1a0505); padding:2rem 2.5rem 1.5rem; border-bottom:1px solid var(--border); }
.dl-hero h1 { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:.04em; display:flex; align-items:center; gap:.6rem; }
.dl-hero h1 i { color:#e50914; }
.dl-hero p { color:var(--muted); font-size:.875rem; margin-top:.3rem; }
.dl-stats { display:flex; gap:1.5rem; margin-top:1rem; flex-wrap:wrap; }
.dl-stat { font-size:.8rem; color:var(--muted); display:flex; align-items:center; gap:.4rem; }
.dl-stat span { color:var(--text); font-weight:700; }
.dl-content { padding:1.5rem 2.5rem 5rem; max-width:900px; }
.dl-empty { text-align:center; padding:4rem 2rem; }
.dl-empty i { font-size:3rem; color:var(--muted); opacity:.4; margin-bottom:1rem; display:block; }
.dl-empty h3 { font-size:1.2rem; font-weight:700; margin-bottom:.5rem; }
.dl-empty p { color:var(--muted); font-size:.875rem; max-width:320px; margin:0 auto 1.5rem; line-height:1.6; }
.dl-empty .btn-play { display:inline-flex; align-items:center; gap:.5rem; text-decoration:none; }
.dl-list { display:flex; flex-direction:column; gap:.75rem; }
.dl-item { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:1rem; display:flex; gap:1rem; align-items:center; transition:.2s; }
.dl-item:hover { border-color:rgba(255,255,255,.15); background:var(--bg3); }
.dl-poster { width:60px; height:88px; object-fit:cover; border-radius:8px; flex-shrink:0; }
.dl-poster-ph { width:60px; height:88px; border-radius:8px; flex-shrink:0; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:1.5rem; color:var(--muted); border:1px solid var(--border); }
.dl-info { flex:1; min-width:0; }
.dl-title { font-size:.95rem; font-weight:700; margin-bottom:.3rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.dl-meta { display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; margin-bottom:.4rem; }
.dl-quality-badge { background:rgba(229,9,20,.15); border:1px solid rgba(229,9,20,.3); color:#e50914; font-size:.7rem; font-weight:700; padding:.2rem .5rem; border-radius:5px; letter-spacing:.5px; }
.dl-size { font-size:.75rem; color:var(--muted); display:flex; align-items:center; gap:.3rem; }
.dl-date { font-size:.72rem; color:var(--muted); }
.dl-status { font-size:.72rem; font-weight:600; display:flex; align-items:center; gap:.3rem; color:#16a34a; }
.dl-actions { display:flex; flex-direction:column; gap:.4rem; align-items:flex-end; flex-shrink:0; }
.dl-btn { background:none; border:1px solid var(--border); color:var(--muted); width:34px; height:34px; border-radius:8px; cursor:pointer; font-size:.85rem; transition:.15s; display:flex; align-items:center; justify-content:center; }
.dl-btn:hover { border-color:var(--red); color:var(--red); }
.dl-btn.play { border-color:rgba(0,212,180,.3); color:var(--teal); }
.dl-btn.play:hover { background:rgba(0,212,180,.1); }
.dl-btn.redownload { border-color:rgba(229,9,20,.3); color:#e50914; }
.dl-btn.redownload:hover { background:rgba(229,9,20,.1); }
.dl-notice { background:rgba(229,9,20,.06); border:1px solid rgba(229,9,20,.15); border-radius:12px; padding:1rem 1.25rem; margin-bottom:1.5rem; display:flex; gap:.75rem; align-items:flex-start; }
.dl-notice i { color:#e50914; flex-shrink:0; margin-top:.1rem; }
.dl-notice p { font-size:.82rem; color:var(--muted); line-height:1.6; }
.dl-notice p strong { color:var(--text); }
.dl-clear-btn { background:none; border:1px solid rgba(229,9,20,.25); color:var(--red); padding:.4rem 1rem; border-radius:8px; font-size:.78rem; font-weight:600; cursor:pointer; font-family:'Outfit',sans-serif; transition:.15s; }
.dl-clear-btn:hover { background:rgba(229,9,20,.1); }
@media(max-width:600px){
  .dl-hero { padding:1.5rem 1rem 1rem; }
  .dl-content { padding:1rem 1rem 5rem; }
  .dl-actions { flex-direction:row; }
}
</style>
</head>
<body class="player-body">
<nav id="navbar" class="nav-player">
  <div class="nav-left">
    <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    <a href="index.html" class="logo">NEX<span>TV</span></a>
  </div>
  <div class="nav-right"><div id="authArea"></div></div>
</nav>

<div class="dl-hero">
  <h1><i class="fas fa-folder-open"></i> Downloads</h1>
  <p>Files saved to your device's Downloads folder</p>
  <div class="dl-stats" id="dlStats"></div>
</div>

<div class="dl-content">
  <div class="dl-notice">
    <i class="fas fa-info-circle"></i>
    <p><strong>How it works:</strong> Click Download on any movie or show, pick your quality (360p · 480p · 720p · 1080p), and the file saves directly to your device's <strong>Downloads folder</strong>. 360p stays under 40 MB, perfect for saving storage.</p>
  </div>
  <div id="dlContainer"></div>
</div>

<script src="db.js"></script>
<script src="app.js"></script>
<script>
DB.init();
renderNav();
renderDownloadsPage();

function renderDownloadsPage() {
  const downloads = getDownloads();
  const container = document.getElementById('dlContainer');
  const statsEl   = document.getElementById('dlStats');

  const totalMB = downloads.reduce((s,d) => s + (d.sizeMB || 0), 0);
  statsEl.innerHTML = `
    <div class="dl-stat"><i class="fas fa-film"></i> <span>${downloads.length}</span> file${downloads.length!==1?'s':''}</div>
    <div class="dl-stat"><i class="fas fa-hdd"></i> <span>~${totalMB >= 1000 ? (totalMB/1000).toFixed(1)+' GB' : totalMB+' MB'}</span> total</div>
  `;

  if (!downloads.length) {
    container.innerHTML = `
      <div class="dl-empty">
        <i class="fas fa-cloud-download-alt"></i>
        <h3>No Downloads Yet</h3>
        <p>Hit <strong>Download</strong> on any movie or show, pick a quality, and it'll save right to your device.</p>
        <a href="index.html" class="btn-play"><i class="fas fa-play"></i> Browse Content</a>
      </div>`;
    return;
  }

  container.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <div style="font-size:.82rem;color:var(--muted);">${downloads.length} file${downloads.length!==1?'s':''} · ~${totalMB >= 1000 ? (totalMB/1000).toFixed(1)+' GB' : totalMB+' MB'} saved</div>
      <button class="dl-clear-btn" onclick="clearAllDownloads()"><i class="fas fa-trash"></i> Clear All</button>
    </div>
    <div class="dl-list" id="dlList"></div>`;

  const list = document.getElementById('dlList');
  list.innerHTML = downloads.map(dl => {
    const movie = DB.getMovie(dl.id);
    if (!movie) return '';
    const quality = dl.quality || '720p';
    const sizeMB  = dl.sizeMB || 0;
    const poster  = dl.poster || movie.poster || '';
    return `
      <div class="dl-item" id="dl-${movie.id}">
        ${poster ? `<img class="dl-poster" src="${poster}" alt="${movie.title}" referrerpolicy="no-referrer" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
        <div class="dl-poster-ph" ${poster?'style="display:none"':''}>🎬</div>
        <div class="dl-info">
          <div class="dl-title">${movie.title}</div>
          <div class="dl-meta">
            <span class="dl-quality-badge">${quality}</span>
            <span class="badge-year">${movie.year}</span>
            <span class="badge-rating"><i class="fas fa-star"></i> ${movie.rating}</span>
            <span class="dl-size"><i class="fas fa-file-video"></i> ~${sizeMB} MB</span>
          </div>
          <div class="dl-status"><i class="fas fa-check-circle"></i> Saved · ${formatDlDate(dl.savedAt)}</div>
        </div>
        <div class="dl-actions">
          <button class="dl-btn play" onclick="window.location.href='watch.html?id=${movie.id}'" title="Watch now"><i class="fas fa-play"></i></button>
          <button class="dl-btn redownload" onclick="showQualityPicker(DB.getMovie('${movie.id}'))" title="Download again"><i class="fas fa-redo"></i></button>
          <button class="dl-btn" onclick="removeDownload('${movie.id}')" title="Remove"><i class="fas fa-trash"></i></button>
        </div>
      </div>`;
  }).join('');
}

function formatDlDate(iso) {
  if (!iso) return 'recently';
  const diff = Math.floor((Date.now() - new Date(iso)) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return 'yesterday';
  return diff + ' days ago';
}

function removeDownload(id) {
  saveDownloads(getDownloads().filter(d=>d.id!==id));
  document.getElementById('dl-'+id)?.remove();
  renderDownloadsPage();
  showToast('Removed from downloads');
}

function clearAllDownloads() {
  if (!confirm('Remove all download records?')) return;
  saveDownloads([]);
  renderDownloadsPage();
  showToast('All downloads cleared');
}
</script>
</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nex TV</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
    }
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #000000cc, #000000),
                  url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');
      background-size: cover;
      background-position: center;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.2rem;
      max-width: 500px;
    }
    .btn {
      margin-top: 20px;
      padding: 12px 30px;
      font-size: 1rem;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    .btn:hover {
      background: darkred;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Unlimited Movies, Anime & Cartoons.</h1>
    <p>Stream on Nex TV anytime, anywhere. Login to access the full library.</p>
    <button class="btn" onclick="window.location.href='login.html'">Sign In</button>
  </div>
</body>
</html>
